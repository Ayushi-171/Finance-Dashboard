<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finsight Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --bg4: #222635;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f2f8;
    --text2: #8b90a4;
    --text3: #555a6e;
    --accent: #6c8fff;
    --accent2: #4a6ef5;
    --green: #3ecf8e;
    --red: #f87171;
    --amber: #fbbf24;
    --purple: #a78bfa;
    --teal: #2dd4bf;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 0 20px 28px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; }
  .logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); }

  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); padding: 0 8px; margin-bottom: 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px;
    cursor: pointer; color: var(--text2); font-size: 13.5px; font-weight: 400; transition: all 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(108,143,255,0.12); color: var(--accent); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-bottom { margin-top: auto; padding: 16px 12px 0; border-top: 1px solid var(--border); }
  .role-select-wrap { padding: 8px 12px; }
  .role-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 6px; }
  .role-select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 12.5px; padding: 7px 10px; border-radius: 7px; cursor: pointer; outline: none;
  }
  .role-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: var(--mono); margin-top: 6px;
  }
  .role-badge.admin { background: rgba(108,143,255,0.15); color: var(--accent); }
  .role-badge.viewer { background: rgba(139,144,164,0.15); color: var(--text2); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .main { flex: 1; overflow-x: hidden; }
  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .page-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .period-select {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 12.5px; padding: 6px 10px; border-radius: 7px; cursor: pointer; outline: none;
  }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); }
  .search-input {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 13px; padding: 6px 10px 6px 30px; border-radius: 7px; outline: none; width: 180px;
    transition: border 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .content { padding: 24px 28px; }

  .view { 
    display: none;
    opacity: 0;
   }
  .view.active { 
    display: block;
    opacity: 0; 
  }
  .view.active.fade-in {
    animation: smoothFade 0.4s ease forwards;
  }
  @keyframes smoothFade {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .summary-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 60px; height: 60px; border-radius: 0 0 0 60px; opacity: 0.08;
  }
  .summary-card.balance::before { background: var(--accent); }
  .summary-card.income::before { background: var(--green); }
  .summary-card.expense::before { background: var(--red); }
  .summary-card.savings::before { background: var(--purple); }
  .card-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 8px; }
  .card-value { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; font-family: var(--mono); }
  .card-value.pos { color: var(--green); }
  .card-value.neg { color: var(--red); }
  .card-change { font-size: 11.5px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .card-icon { position: absolute; top: 16px; right: 16px; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .card-icon svg { width: 15px; height: 15px; }
  .card-icon.balance { background: rgba(108,143,255,0.15); color: var(--accent); }
  .card-icon.income { background: rgba(62,207,142,0.15); color: var(--green); }
  .card-icon.expense { background: rgba(248,113,113,0.15); color: var(--red); }
  .card-icon.savings { background: rgba(167,139,250,0.15); color: var(--purple); }
  .up { color: var(--green); }
  .down { color: var(--red); }

  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .chart-title { font-size: 14px; font-weight: 500; }
  .chart-legend { display: flex; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 500; }
  .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border2);
    background: none; color: var(--text2); font-family: var(--font); transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(108,143,255,0.15); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .filter-select {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 12px; padding: 5px 8px; border-radius: 7px; cursor: pointer; outline: none;
  }
  .add-btn {
    padding: 7px 14px; border-radius: 8px; background: var(--accent2); color: white;
    border: none; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn svg { width: 14px; height: 14px; }

  .tx-table { width: 100%; border-collapse: collapse; }
  .tx-table th {
    text-align: left; font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.5px;
    text-transform: uppercase; padding: 0 12px 10px; border-bottom: 1px solid var(--border);
  }
  .tx-table td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .tx-table tr:last-child td { border-bottom: none; }
  .tx-table tr:hover td { background: var(--bg3); }
  .tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .tx-name { font-size: 13.5px; font-weight: 500; }
  .tx-cat { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
  .tx-amount { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .type-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-family: var(--mono); }
  .type-badge.income { background: rgba(62,207,142,0.12); color: var(--green); }
  .type-badge.expense { background: rgba(248,113,113,0.12); color: var(--red); }
  .tx-date { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  .insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .insight-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .insight-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 20px; }
  .insight-label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 6px; }
  .insight-value { font-size: 18px; font-weight: 600; font-family: var(--mono); margin-bottom: 4px; }
  .insight-sub { font-size: 12px; color: var(--text2); }
  .progress-bar-wrap { margin-top: 8px; background: var(--bg3); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 4px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px;
    padding: 28px; width: 420px; max-width: 95vw;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-family: var(--mono); }
  .form-input, .form-select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
    font-family: var(--font); font-size: 13.5px; padding: 9px 12px; border-radius: 8px; outline: none;
    transition: border 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border2); background: none;
    color: var(--text2); font-family: var(--font); font-size: 13px; cursor: pointer;
  }
  .btn-save {
    padding: 8px 20px; border-radius: 8px; background: var(--accent2); color: white;
    border: none; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer;
  }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state p { font-size: 14px; }

  .bottom-nav{
    display: none;
  }
  
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .insights-grid { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 16px 16px 90px; }
    .topbar { padding: 14px 16px; }

     .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        padding: 8px 0;
        z-index: 50;
    }
    .bottom-nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--text3);
        font-family: var(--font);
        font-size: 11px;
        cursor: pointer;
        padding: 6px 0;
        transition: color 0.15s;
    }
    .bottom-nav-item svg {
        width: 20px;
        height: 20px;
    }
    .bottom-nav-item.active {
        color: var(--accent);
    }
    .bottom-nav-item:hover {
        color: var(--text);
    }
}

  @media (max-width: 540px) {
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .card-value { font-size: 19px; }
    .insights-grid { grid-template-columns: 1fr; }
  }

  .fade-in { animation: fadeIn 0.3s ease forwards; }

  .skeleton {
    background: var(--bg3);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
}
.skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.04) 50%,
        transparent 100%
    );
    animation: shimmer 1.2s infinite;
}
@keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
}
.skeleton-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.skeleton-line {
    height: 12px;
    border-radius: 6px;
}
.skeleton-circle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
}

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .summary-card { animation: fadeIn 0.35s ease both; }
  .summary-card:nth-child(1) { animation-delay: 0.0s; }
  .summary-card:nth-child(2) { animation-delay: 0.06s; }
  .summary-card:nth-child(3) { animation-delay: 0.12s; }
  .summary-card:nth-child(4) { animation-delay: 0.18s; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="logo-text">Finsight</div>
        <div class="logo-sub">Finance OS</div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <button class="nav-item active" onclick="switchView('overview', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="nav-item" onclick="switchView('transactions', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Transactions
      </button>
      <button class="nav-item" onclick="switchView('insights', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Insights
      </button>
    </div>
    <div class="sidebar-bottom">
      <div class="role-select-wrap">
        <div class="role-label">Role</div>
        <select class="role-select" id="roleSelect" onchange="changeRole(this.value)">
          <option value="admin">Admin</option>
          <option value="viewer">Viewer</option>
        </select>
        <div id="roleBadge" class="role-badge admin"><span class="badge-dot"></span> Admin</div>
      </div>
    </div>
  </aside>


   <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" onclick="switchView('overview', this); setBottomNav(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>Overview</span>
    </button>
    <button class="bottom-nav-item" onclick="switchView('transactions', this); setBottomNav(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Transactions</span>
    </button>
    <button class="bottom-nav-item" onclick="switchView('insights', this); setBottomNav(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Insights</span>
    </button>
  </nav>

  <main class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Overview</div>
      <div class="topbar-right">
        <select class="period-select" id="periodSelect" onchange="updatePeriod(this.value)">
          <option value="3">Last 3 months</option>
          <option value="6" selected>Last 6 months</option>
          <option value="12">Last 12 months</option>
        </select>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="searchInput" placeholder="Search transactions..." oninput="handleSearch(this.value)" />
        </div>
      </div>
    </div>

    <div class="content">
      <div class="view active" id="view-overview">
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="charts-row">
          <div class="chart-card">
            <div class="chart-header">
              <div class="chart-title">Balance Trend</div>
              <div class="chart-legend">
                <div class="legend-item"><div class="legend-dot" style="background:#6c8fff"></div>Income</div>
                <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Expense</div>
              </div>
            </div>
            <div style="position:relative;height:220px"><canvas id="trendChart"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-header"><div class="chart-title">Spending by Category</div></div>
            <div style="position:relative;height:200px"><canvas id="donutChart"></canvas></div>
            <div id="donutLegend" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;font-size:11.5px;color:var(--text2)"></div>
          </div>
        </div>
        <div class="chart-card" style="margin-bottom:0">
          <div class="chart-header"><div class="chart-title">Monthly Cashflow</div></div>
          <div style="position:relative;height:160px"><canvas id="cashflowChart"></canvas></div>
        </div>
      </div>

      <div class="view" id="view-transactions">
        <div class="section-header">
          <div class="filters">
            <button class="filter-btn active" onclick="setTypeFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setTypeFilter('income', this)">Income</button>
            <button class="filter-btn" onclick="setTypeFilter('expense', this)">Expense</button>
            <select class="filter-select" id="catFilter" onchange="setCatFilter(this.value)">
              <option value="all">All categories</option>
            </select>
            <select class="filter-select" id="sortSelect" onchange="setSortOrder(this.value)">
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
              <option value="amount-desc">Highest amount</option>
              <option value="amount-asc">Lowest amount</option>
            </select>
            <input type="date" class="filter-select" id="fromDate" onchange="setDateRange()" />
            <input type="date" class="filter-select" id="toDate" onchange="setDateRange()" />
            <button class="filter-btn" onclick="clearDateRange()">Clear dates</button>
          </div>
          <button class="add-btn" id="addTxBtn" onclick="openModal()">

          </div>
          <div class="chart-card">
            <div class="chart-header"><div class="chart-title">Category Breakdown</div></div>

</div>

</div>

<script>
const CAT_COLORS = {
  Food: '#f87171', Transport: '#fbbf24', Shopping: '#a78bfa',
  Bills: '#6c8fff', Entertainment: '#2dd4bf', Health: '#3ecf8e',

const CAT_EMOJI = {

};

let transactions = [
  {id:1,desc:'Monthly Salary',amount:85000,type:'income',cat:'Salary',date:'2026-04-01'},
  {id:2,desc:'Freelance Project',amount:22000,type:'income',cat:'Freelance',date:'2026-04-03'},

  {id:5,desc:'Zomato Order',amount:680,type:'expense',cat:'Food',date:'2026-04-03'},
  {id:6,desc:'Uber Rides',amount:1240,type:'expense',cat:'Transport',date:'2026-03-30'},
  {id:7,desc:'Monthly Salary',amount:85000,type:'income',cat:'Salary',date:'2026-03-01'},
  {id:8,desc:'Amazon Shopping',amount:4500,type:'expense',cat:'Shopping',date:'2026-03-22'},
  {id:9,desc:'Netflix + Spotify',amount:1100,type:'expense',cat:'Entertainment',date:'2026-03-05'},
  {id:10,desc:'Doctor Visit',amount:900,type:'expense',cat:'Health',date:'2026-03-18'},
  {id:11,desc:'Freelance Design',amount:15000,type:'income',cat:'Freelance',date:'2026-03-12'},
  {id:12,desc:'Restaurant Dinner',amount:2100,type:'expense',cat:'Food',date:'2026-03-25'},
  {id:13,desc:'Monthly Salary',amount:85000,type:'income',cat:'Salary',date:'2026-02-01'},
  {id:14,desc:'Phone Recharge',amount:599,type:'expense',cat:'Bills',date:'2026-02-03'},
  {id:15,desc:'Gym Membership',amount:1500,type:'expense',cat:'Health',date:'2026-02-01'},
  {id:16,desc:'Weekend Trip',amount:8500,type:'expense',cat:'Entertainment',date:'2026-02-14'},
  {id:17,desc:'Freelance SEO',amount:12000,type:'income',cat:'Freelance',date:'2026-02-20'},
  {id:18,desc:'Grocery Run',amount:2800,type:'expense',cat:'Food',date:'2026-02-08'},
  {id:19,desc:'Monthly Salary',amount:85000,type:'income',cat:'Salary',date:'2026-01-01'},
  {id:20,desc:'New Laptop',amount:72000,type:'expense',cat:'Shopping',date:'2026-01-15'},
  {id:21,desc:'Internet Bill',amount:999,type:'expense',cat:'Bills',date:'2026-01-03'},
  {id:22,desc:'Freelance Work',amount:18000,type:'income',cat:'Freelance',date:'2026-01-22'},
  {id:23,desc:'Swiggy Orders',amount:1900,type:'expense',cat:'Food',date:'2026-01-28'},
  {id:24,desc:'Monthly Salary',amount:85000,type:'income',cat:'Salary',date:'2025-12-01'},
  {id:25,desc:'Christmas Shopping',amount:12000,type:'expense',cat:'Shopping',date:'2025-12-20'},
  {id:26,desc:'Year-end Bonus',amount:30000,type:'income',cat:'Salary',date:'2025-12-31'},
];

// ── Mock API ──────────────────────────────────────────
// simulates a real API call with a delay
function mockApi(ms = 800) {
    return new Promise(resolve => setTimeout(resolve, ms));
}
// ─────────────────────────────────────────────────────
function showOverviewSkeleton() {
    document.getElementById('summaryGrid').innerHTML = `
        ${[1,2,3,4].map(() => `
            <div class="skeleton-card">
                <div class="skeleton skeleton-line" style="width:60%"></div>
                <div class="skeleton skeleton-line" style="width:40%;height:24px"></div>
                <div class="skeleton skeleton-line" style="width:50%"></div>
            </div>
        `).join('')}
    `;
}

function showTransactionsSkeleton() {
    document.getElementById('txTableWrap').innerHTML = `
        <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
            ${[1,2,3,4,5,6].map(() => `
                <div style="display:flex;align-items:center;gap:12px">
                    <div class="skeleton skeleton-circle"></div>
                    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
                        <div class="skeleton skeleton-line" style="width:40%"></div>
                        <div class="skeleton skeleton-line" style="width:25%"></div>
                    </div>
                    <div class="skeleton skeleton-line" style="width:80px;height:16px"></div>
                </div>
            `).join('')}
        </div>
    `;
}

function showInsightsSkeleton() {
    document.getElementById('insightsGrid').innerHTML = `
        ${[1,2,3].map(() => `
            <div class="skeleton-card">
                <div class="skeleton skeleton-line" style="width:30%"></div>
                <div class="skeleton skeleton-line" style="width:50%;height:24px"></div>
                <div class="skeleton skeleton-line" style="width:70%"></div>
                <div class="skeleton skeleton-line" style="width:100%;height:4px"></div>
            </div>
        `).join('')}
    `;
}


let state = {
  role: 'admin',
  view: 'overview',
  typeFilter: 'all',
  catFilter: 'all',
  sortOrder: 'date-desc',
  searchQuery: '',
  period: 6,
  fromDate: null,   
  toDate: null,
};

let charts = {};

function getFilteredTx() {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - state.period);
  return transactions.filter(t => {
    const d = new Date(t.date);
    if (state.fromDate && state.toDate) {
      const from = new Date(state.fromDate);
      const to = new Date(state.toDate);
      if (d < from || d > to) return false;
    } else {
    if (d < cutoff) return false;
  }
    if (state.typeFilter !== 'all' && t.type !== state.typeFilter) return false;
    if (state.catFilter !== 'all' && t.cat !== state.catFilter) return false;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      if (!t.desc.toLowerCase().includes(q) && !t.cat.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (state.sortOrder === 'date-desc') return new Date(b.date) - new Date(a.date);
    if (state.sortOrder === 'date-asc') return new Date(a.date) - new Date(b.date);
    if (state.sortOrder === 'amount-desc') return b.amount - a.amount;
    if (state.sortOrder === 'amount-asc') return a.amount - b.amount;
  });
}

function fmt(n) { return '₹' + n.toLocaleString('en-IN'); }
function fmtShort(n) { return n >= 100000 ? '₹' + (n/100000).toFixed(1) + 'L' : n >= 1000 ? '₹' + (n/1000).toFixed(0) + 'k' : '₹' + n; }

function computeSummary() {
  const tx = getFilteredTx();
  const income = tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return { income, expense, balance: income - expense, savings: Math.max(0, income - expense) };
}

function renderSummary() {
  const s = computeSummary();
  const savingRate = s.income > 0 ? Math.round(s.savings / s.income * 100) : 0;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card balance">
      <div class="card-icon balance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
      <div class="card-label">Net Balance</div>
      <div class="card-value ${s.balance>=0?'pos':'neg'}">${fmtShort(Math.abs(s.balance))}</div>
      <div class="card-change ${s.balance>=0?'up':'down'}">${s.balance>=0?'▲':'▼'} ${savingRate}% savings rate</div>
    </div>
    <div class="summary-card income">
      <div class="card-icon income"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
      <div class="card-label">Total Income</div>
      <div class="card-value pos">${fmtShort(s.income)}</div>
      <div class="card-change up">▲ All sources</div>
    </div>
    <div class="summary-card expense">
      <div class="card-icon expense"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></div>
      <div class="card-label">Total Expenses</div>
      <div class="card-value neg">${fmtShort(s.expense)}</div>
      <div class="card-change down">▼ ${Math.round(s.expense/Math.max(s.income,1)*100)}% of income</div>
    </div>
    <div class="summary-card savings">
      <div class="card-icon savings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></div>
      <div class="card-label">Net Savings</div>
      <div class="card-value" style="color:var(--purple)">${fmtShort(s.savings)}</div>
      <div class="card-change up" style="color:var(--purple)">▲ ${savingRate}% rate</div>
    </div>
  `;
}

function getMonthlyData() {
  const months = [];
  for (let i = state.period - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
    const key = d.toISOString().slice(0,7);
    const label = d.toLocaleString('en-IN', {month:'short'});
    const inc = transactions.filter(t=>t.date.startsWith(key)&&t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = transactions.filter(t=>t.date.startsWith(key)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    months.push({key,label,inc,exp});
  }
  return months;
}

function renderCharts() {
  const months = getMonthlyData();
  const labels = months.map(m=>m.label);

  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Income', data: months.map(m=>m.inc), borderColor:'#6c8fff', backgroundColor:'rgba(108,143,255,0.08)', tension:0.4, fill:true, pointRadius:4, pointBackgroundColor:'#6c8fff' },
        { label:'Expense', data: months.map(m=>m.exp), borderColor:'#f87171', backgroundColor:'rgba(248,113,113,0.06)', tension:0.4, fill:true, pointRadius:4, pointBackgroundColor:'#f87171' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' ' + fmtShort(ctx.raw) } } },
      scales:{ x:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555a6e',font:{size:11}} }, y:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#555a6e',font:{size:11},callback:v=>fmtShort(v)} } }
    }
  });

  const catTotals = {};
  getFilteredTx().filter(t=>t.type==='expense').forEach(t=>{ catTotals[t.cat] = (catTotals[t.cat]||0) + t.amount; });
  const catLabels = Object.keys(catTotals).sort((a,b)=>catTotals[b]-catTotals[a]);
  const catVals = catLabels.map(c=>catTotals[c]);
  const catColorsArr = catLabels.map(c=>CAT_COLORS[c]||'#8b90a4');
  const total = catVals.reduce((a,b)=>a+b,0);

  if (charts.donut) charts.donut.destroy();
  charts.donut = new Chart(document.getElementById('donutChart'), {
    type:'doughnut',
    data:{ labels:catLabels, datasets:[{ data:catVals, backgroundColor:catColorsArr, borderWidth:2, borderColor:'#13161d', hoverOffset:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'70%', plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' ' + ctx.label + ': ' + fmtShort(ctx.raw) } } } }
  });
  document.getElementById('donutLegend').innerHTML = catLabels.map((c,i)=>
    `<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${catColorsArr[i]};flex-shrink:0"></span>${c} ${Math.round(catVals[i]/total*100)}%</span>`
  ).join('');

  if (charts.cashflow) charts.cashflow.destroy();
  charts.cashflow = new Chart(document.getElementById('cashflowChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Income', data:months.map(m=>m.inc), backgroundColor:'rgba(108,143,255,0.7)', borderRadius:4 },
        { label:'Expense', data:months.map(m=>m.exp), backgroundColor:'rgba(248,113,113,0.6)', borderRadius:4 }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' ' + ctx.dataset.label + ': ' + fmtShort(ctx.raw) } } },
      scales:{ x:{grid:{display:false},ticks:{color:'#555a6e',font:{size:11}}}, y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a6e',font:{size:11},callback:v=>fmtShort(v)}} }
    }
  });
}

function renderTransactions() {
  const filtered = getFilteredTx();
  const cats = [...new Set(transactions.map(t=>t.cat))].sort();
  const sel = document.getElementById('catFilter');
  sel.innerHTML = '<option value="all">All categories</option>' + cats.map(c=>`<option value="${c}" ${state.catFilter===c?'selected':''}>${c}</option>`).join('');
  document.getElementById('addTxBtn').style.display = state.role === 'admin' ? 'flex' : 'none';

  if (!filtered.length) {
    document.getElementById('txTableWrap').innerHTML = `<div class="empty-state"><p>No transactions found</p></div>`;
    return;
  }

  const rows = filtered.map(t => {
    const editBtn = state.role === 'admin' ? `<button onclick="editTx(${t.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:12px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">✎</button>
    <button onclick="deleteTx(${t.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:5px;font-size:12px;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">✕</button>` : '';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="tx-icon" style="background:${CAT_COLORS[t.cat]}1a">${CAT_EMOJI[t.cat]||'📦'}</div>
        <div><div class="tx-name">${t.desc}</div><div class="tx-cat">${t.cat}</div></div>
      </div></td>
      <td><span class="type-badge ${t.type}">${t.type}</span></td>
      <td><span class="tx-amount ${t.type==='income'?'pos':'neg'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span></td>
      <td><span class="tx-date">${new Date(t.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span></td>
      <td style="text-align:right;white-space:nowrap">${editBtn}</td>
    </tr>`;
  }).join('');

  document.getElementById('txTableWrap').innerHTML = `<table class="tx-table">
    <thead><tr><th>Transaction</th><th>Type</th><th>Amount</th><th>Date</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderInsights() {
  const tx = getFilteredTx();
  const expenses = tx.filter(t=>t.type==='expense');
  const income = tx.filter(t=>t.type==='income');
  const catTotals = {};
  expenses.forEach(t=>{ catTotals[t.cat]=(catTotals[t.cat]||0)+t.amount; });
  const topCat = Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  const totalExp = expenses.reduce((s,t)=>s+t.amount,0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const savingRate = totalInc > 0 ? Math.round((totalInc-totalExp)/totalInc*100) : 0;
  const avgMonthlyExp = Math.round(totalExp / Math.max(state.period, 1));
  const txCount = tx.length;

  document.getElementById('insightsGrid').innerHTML = `
    <div class="insight-card fade-in">
      <div class="insight-icon" style="background:rgba(248,113,113,0.15)">🔥</div>
      <div class="insight-label">Top Spending</div>
      <div class="insight-value" style="color:var(--red)">${topCat?topCat[0]:'—'}</div>
      <div class="insight-sub">${topCat?fmt(topCat[1])+' spent':''}</div>
      ${topCat?`<div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.round(topCat[1]/totalExp*100)}%;background:var(--red)"></div></div>`:''}
    </div>
    <div class="insight-card fade-in">
      <div class="insight-icon" style="background:rgba(62,207,142,0.15)">📈</div>
      <div class="insight-label">Savings Rate</div>
      <div class="insight-value" style="color:var(--green)">${savingRate}%</div>
      <div class="insight-sub">${savingRate>20?'Healthy savings!':savingRate>0?'Room to improve':'Spending exceeds income'}</div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${Math.min(savingRate,100)}%;background:var(--green)"></div></div>
    </div>
    <div class="insight-card fade-in">
      <div class="insight-icon" style="background:rgba(108,143,255,0.15)">💡</div>
      <div class="insight-label">Avg Monthly Spend</div>
      <div class="insight-value" style="color:var(--accent)">${fmtShort(avgMonthlyExp)}</div>
      <div class="insight-sub">${txCount} transactions total</div>
    </div>
  `;

  const months = getMonthlyData();
  const labels = months.map(m=>m.label);
  if (charts.comp) charts.comp.destroy();
  charts.comp = new Chart(document.getElementById('compChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Income', data:months.map(m=>m.inc), backgroundColor:'rgba(108,143,255,0.7)', borderRadius:4 },
        { label:'Expense', data:months.map(m=>m.exp), backgroundColor:'rgba(248,113,113,0.6)', borderRadius:4 },
        { label:'Net', data:months.map(m=>m.inc-m.exp), backgroundColor:'rgba(62,207,142,0.6)', borderRadius:4 }
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{ legend:{ labels:{color:'#8b90a4',font:{size:11}} }, tooltip:{ callbacks:{ label: ctx => ' ' + ctx.dataset.label + ': ' + fmtShort(ctx.raw) } } },
      scales:{ x:{grid:{display:false},ticks:{color:'#555a6e',font:{size:11}}}, y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a6e',font:{size:11},callback:v=>fmtShort(v)}} }
    }
  });

  const catsSorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  if (charts.catBar) charts.catBar.destroy();
  charts.catBar = new Chart(document.getElementById('catBarChart'), {
    type:'bar',
    data:{
      labels: catsSorted.map(c=>c[0]),
      datasets:[{ label:'Spent', data:catsSorted.map(c=>c[1]), backgroundColor:catsSorted.map(c=>CAT_COLORS[c[0]]||'#8b90a4'), borderRadius:5 }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ' ' + fmtShort(ctx.raw) } } },
      scales:{ x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555a6e',font:{size:11},callback:v=>fmtShort(v)}}, y:{grid:{display:false},ticks:{color:'#8b90a4',font:{size:11}}} }
    }
  });
}

async function renderCurrentView() {
  if (state.view === 'overview') {
    showOverviewSkeleton();
    await mockApi(700);
    renderSummary();
    renderCharts();
  }
  else if (state.view === 'transactions') {
    showTransactionsSkeleton();
    await mockApi(600);
    renderTransactions();
  }
  else if (state.view === 'insights') {
    showInsightsSkeleton();
    await mockApi(750);
    renderInsights();
  }
}

function switchView(v, btn) {
  state.view = v;

  document.querySelectorAll('.view').forEach(el => {
  el.classList.remove('active');
  el.classList.remove('fade-in');
  });
  const activeView = document.getElementById('view-' + v);
  activeView.classList.add('active');
  setTimeout(() => {
    activeView.classList.add('fade-in');
  }, 50);
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { overview:'Overview', transactions:'Transactions', insights:'Insights' };
  document.getElementById('pageTitle').textContent = titles[v];
  renderCurrentView();
}

function changeRole(r) {
  state.role = r;
  const badge = document.getElementById('roleBadge');
  badge.className = 'role-badge ' + r;
  badge.innerHTML = `<span class="badge-dot"></span> ${r.charAt(0).toUpperCase()+r.slice(1)}`;
  renderCurrentView();
}

function updatePeriod(v) { state.period = +v; renderCurrentView(); }
function handleSearch(v) { state.searchQuery = v; if (state.view==='transactions') renderTransactions(); }
function setTypeFilter(v, btn) {
  state.typeFilter = v;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTransactions();
}
function setCatFilter(v) { state.catFilter = v; renderTransactions(); }
function setSortOrder(v) { state.sortOrder = v; renderTransactions(); }

function setBottomNav(btn) {
    document.querySelectorAll('.bottom-nav-item')
            .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function setDateRange() {
  state.fromDate = document.getElementById('fromDate').value || null;
  state.toDate = document.getElementById('toDate').value || null;
  renderTransactions();
}

function clearDateRange() {
  state.fromDate = null;
  state.toDate = null;
  document.getElementById('fromDate').value = '';
  document.getElementById('toDate').value = '';
  renderTransactions();
}

let editingId = null;
function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Edit Transaction' : 'Add Transaction';
  if (id) {
    const t = transactions.find(x=>x.id===id);
    document.getElementById('fDesc').value = t.desc;
    document.getElementById('fAmount').value = t.amount;
    document.getElementById('fDate').value = t.date;
    document.getElementById('fType').value = t.type;
    document.getElementById('fCat').value = t.cat;
  } else {
    document.getElementById('fDesc').value = '';
    document.getElementById('fAmount').value = '';
    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('fType').value = 'expense';
    document.getElementById('fCat').value = 'Food';
  }
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
function editTx(id) { openModal(id); }
function deleteTx(id) {
  transactions = transactions.filter(t=>t.id!==id);
  renderTransactions();
}
function saveTransaction() {
  const desc = document.getElementById('fDesc').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);
  const date = document.getElementById('fDate').value;
  const type = document.getElementById('fType').value;
  const cat = document.getElementById('fCat').value;
  if (!desc || !amount || !date) return;
  if (editingId) {
    const t = transactions.find(x=>x.id===editingId);
    Object.assign(t, {desc,amount,date,type,cat});
  } else {
    transactions.push({id:Date.now(),desc,amount,type,cat,date});
  }
  closeModal();
  renderTransactions();
}

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

const initialView = document.getElementById('view-overview');
initialView.classList.add('active');
setTimeout(() => {
    initialView.classList.add('fade-in');
}, 50);

// load overview with skeleton on page load
showOverviewSkeleton();
mockApi(800).then(() => {
    renderSummary();
    renderCharts();
});
</script>
</body>
</html>
